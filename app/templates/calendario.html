<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanGym Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/calendario.css') }}">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo"><span>Plan</span>Gym</div>

        <nav>
            <button class="nav-item active" onclick="showPage('inicio', this)">Inicio</button>
            <button class="nav-item" onclick="showPage('rutinas', this)">Rutinas</button>
            <button class="nav-item" onclick="showPage('calendario', this)">Calendario</button>
            <button class="nav-item" onclick="showPageEjercicios('ejercicios', this)">Ejercicios</button>
        </nav>

        <div class="user-box">
            <div class="avatar">{{ nombre[0] | upper }}</div>
            <span>{{ nombre }}</span>
        </div>
        <a href="/auth/logout" style="color:#888; font-size:0.85rem; text-align:center; margin-top:8px; display:block;">
            Cerrar sesión
        </a>
    </aside>

    <main class="main">

        <header class="topbar">
            <h1 id="page-title">Inicio</h1>
            <p>Lunes, 13 de abril de 2026</p>
        </header>

        <section class="content">

            <!-- INICIO -->
            <div class="page active" id="page-inicio">
                <div class="stats">
                    <div class="card">
                        <span>Entrenamientos</span>
                        <h2>12</h2>
                    </div>
                    <div class="card">
                        <span>Racha</span>
                        <h2>4</h2>
                    </div>
                    <div class="card">
                        <span>Rutina activa</span>
                        <h2 id="rutina-activa-nombre">Push Pull Legs</h2>
                    </div>
                </div>
            </div>

            <!-- RUTINAS -->
            <div class="page" id="page-rutinas">

                <div class="panel">
                    <h3>Nueva rutina</h3>

                    <input type="text" id="nombre-rutina" placeholder="Nombre de la rutina">

                    <div id="ejercicios-selector" class="chips"></div>

                    <button onclick="crearRutina()">Crear rutina</button>
                </div>

                <div class="panel">
                    <h3>Mis rutinas</h3>
                    <div id="rutinas-container"></div>
                </div>

            </div>

            <!-- CALENDARIO -->
           <div class="page" id="page-calendario">
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button onclick="cambiarMes(-1)">← Anterior</button>
                <h3 id="mes-anio"></h3>
                <button onclick="cambiarMes(1)">Siguiente →</button>
            </div>

            <div class="calendar-grid" id="calendar-grid"></div>

            <button class="complete-btn" onclick="marcarDiaCompletado()">
                Marcar / Desmarcar día
            </button>
        </div>
</div>

            <!-- EJERCICIOS -->
<div class="page" id="page-ejercicios">
    <div class="panel">
        <h3>Catálogo de ejercicios</h3>
        <p style="color:#888; font-size:0.85rem; margin-bottom:16px;">
            Datos de <a href="https://wger.de" target="_blank" style="color:#6366f1">wger.de</a>
        </p>
        <div class="filtros" id="filtros-categorias">
            <button class="filtro-btn active" onclick="filtrarEjercicios(null, this)">Todos</button>
        </div>
        <div class="ejercicios-grid" id="ejercicios-grid">
            <p class="loading-text">Cargando ejercicios...</p>
        </div>
    </div>
    <!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
    <div class="modal" id="modal-content">
        <button class="modal-close" onclick="cerrarModal()">✕</button>
        <p class="loading-text">Cargando...</p>
    </div>
</div>
</div>



        </section>

    </main>

</div>

<script src="{{ url_for('static', filename='js/calendario.js') }}"></script>
</body>
</html>
